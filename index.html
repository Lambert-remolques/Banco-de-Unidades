<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco de Unidades | Lambert</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,500;0,700;1,800;1,900&display=swap" rel="stylesheet">

    <style>
        :root {
            --verde: #159947;
            --verde-oscuro: #078334;
            --rojo: #da251d;
            --negro: #262626;
            --grafito: #333333;
            --gris: #e6e6e6;
            --gris-texto: #555555;
            --blanco: #ffffff;
            --sombra-card: 0 4px 14px rgba(38, 38, 38, 0.15);
            --sombra-panel: 0 10px 28px rgba(38, 38, 38, 0.10);
            --fuente: "Montserrat", Arial, sans-serif;
            --radio: 3px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--negro);
            font-family: var(--fuente);
            background:
                linear-gradient(90deg, rgba(38, 38, 38, 0.045) 1px, transparent 1px),
                linear-gradient(0deg, rgba(38, 38, 38, 0.035) 1px, transparent 1px),
                #f8f8f8;
            background-size: 64px 64px;
        }

        button,
        a {
            font: inherit;
        }

        button {
            border: 0;
        }

        .hero {
            position: relative;
            min-height: 300px;
            overflow: hidden;
            color: var(--blanco);
            background:
                radial-gradient(circle at 18% 12%, rgba(255, 255, 255, 0.08), transparent 24%),
                linear-gradient(135deg, #101213 0%, #191c1d 44%, #242728 100%);
            box-shadow: inset 0 -1px rgba(255, 255, 255, 0.08);
        }

        .hero::before,
        .hero::after {
            content: "";
            position: absolute;
            top: -70px;
            bottom: -90px;
            width: 190px;
            background: rgba(255, 255, 255, 0.045);
            transform: skewX(-24deg);
            pointer-events: none;
        }

        .hero::before {
            right: 210px;
        }

        .hero::after {
            right: 84px;
            opacity: 0.55;
        }

        .hero-inner {
            position: relative;
            z-index: 1;
            width: min(1280px, calc(100% - 80px));
            margin: 0 auto;
            padding: 28px 0 42px;
        }

        .logo {
            display: block;
            width: 190px;
            height: auto;
            margin: 0 0 30px auto;
            filter: drop-shadow(0 4px 9px rgba(0, 0, 0, 0.45));
        }

        .hero-content {
            position: relative;
            max-width: 960px;
            padding-left: 26px;
        }

        .hero-content::before {
            content: "";
            position: absolute;
            left: 0;
            top: 4px;
            bottom: 0;
            width: 3px;
            background: var(--verde);
        }

        .hero-kicker {
            margin: 0 0 12px;
            color: var(--verde);
            font-size: clamp(0.9rem, 1.2vw, 1.08rem);
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            line-height: 1.05;
        }

        .hero-title {
            margin: 0;
            color: var(--blanco);
            font-size: clamp(2.15rem, 6vw, 4.9rem);
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            line-height: 0.94;
            letter-spacing: 0;
            text-shadow: 0 7px 14px rgba(0, 0, 0, 0.32);
            white-space: nowrap;
        }

        .red-rule {
            width: 64px;
            height: 4px;
            margin: 19px 0 14px;
            background: var(--rojo);
        }

        .hero-description {
            margin: 0;
            color: rgba(255, 255, 255, 0.78);
            font-size: clamp(0.9rem, 1.3vw, 1.05rem);
            font-weight: 500;
            line-height: 1.55;
        }

        .category-panel {
            position: sticky;
            top: 0;
            z-index: 20;
            width: min(1280px, calc(100% - 112px));
            margin: -1px auto 0;
            padding: 22px;
            background: rgba(255, 255, 255, 0.94);
            box-shadow: var(--sombra-panel);
        }

        .category-list {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 22px;
        }

        .category-button {
            position: relative;
            min-height: 48px;
            padding: 0 18px;
            border-radius: var(--radio);
            color: var(--blanco);
            background: linear-gradient(180deg, var(--verde), var(--verde-oscuro));
            box-shadow: inset 0 1px rgba(255, 255, 255, 0.14);
            cursor: pointer;
            transition: transform 160ms ease, filter 160ms ease, box-shadow 160ms ease;
        }

        .category-button::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: -11px;
            width: 0;
            height: 0;
            border-left: 11px solid transparent;
            border-right: 11px solid transparent;
            border-top: 11px solid var(--negro);
            opacity: 0;
            transform: translateX(-50%) translateY(-4px);
            transition: opacity 160ms ease, transform 160ms ease;
        }

        .category-button:hover,
        .category-button.active {
            transform: translateY(-2px);
            filter: brightness(1.04);
            box-shadow: 0 9px 18px rgba(21, 153, 71, 0.24);
        }

        .category-button.active {
            background: linear-gradient(180deg, var(--negro), #151515);
            box-shadow: 0 10px 22px rgba(38, 38, 38, 0.22);
        }

        .category-button.active::after {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .category-name {
            display: block;
            font-size: clamp(0.82rem, 1.25vw, 1.02rem);
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            line-height: 1;
            white-space: nowrap;
        }

        main {
            width: min(1280px, calc(100% - 112px));
            margin: 0 auto;
            padding: 36px 0 56px;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
            animation: fadeIn 260ms ease both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-head {
            margin-bottom: 20px;
        }

        .section-title-wrap {
            display: inline-grid;
            grid-template-columns: 5px auto;
            align-items: end;
            column-gap: 18px;
            padding-bottom: 5px;
            border-bottom: 2px solid rgba(21, 153, 71, 0.82);
            min-width: min(435px, 100%);
        }

        .section-title-wrap::before {
            content: "";
            width: 5px;
            height: 36px;
            background: var(--verde);
        }

        .section-title {
            margin: 0;
            color: var(--verde);
            font-size: clamp(2rem, 4vw, 3.2rem);
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            line-height: 0.9;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 18px 26px;
        }

        .product-card {
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: 168px;
            padding: 23px 24px 18px 28px;
            border-radius: var(--radio);
            border-left: 5px solid var(--verde);
            background: rgba(255, 255, 255, 0.96);
            box-shadow: var(--sombra-card);
            transition: transform 160ms ease, box-shadow 160ms ease;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 28px rgba(38, 38, 38, 0.20);
        }

        .product-name {
            margin: 0 0 11px;
            color: var(--negro);
            font-size: clamp(1rem, 1.55vw, 1.28rem);
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            line-height: 1.08;
        }

        .product-description {
            margin: 0 0 16px;
            color: var(--gris-texto);
            font-size: 0.88rem;
            font-weight: 500;
            line-height: 1.45;
        }

        .divider {
            border: 0;
            height: 1px;
            margin: auto 0 14px;
            background-image: linear-gradient(90deg, rgba(38, 38, 38, 0.20) 45%, transparent 45%);
            background-size: 5px 1px;
        }

        .sheet-link {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 34px;
            width: 100%;
            border-radius: var(--radio);
            color: var(--blanco);
            background: linear-gradient(180deg, var(--verde), var(--verde-oscuro));
            font-size: 0.74rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            text-decoration: none;
            transition: filter 160ms ease, transform 160ms ease;
        }

        .sheet-link:hover {
            filter: brightness(1.06);
            transform: translateY(-1px);
        }

        .empty-state {
            padding: 28px;
            border-left: 5px solid var(--verde);
            background: var(--blanco);
            box-shadow: var(--sombra-card);
            color: var(--gris-texto);
            font-weight: 500;
        }

        @media (max-width: 1100px) {
            .category-panel,
            main {
                width: min(100% - 48px, 1280px);
            }

            .category-list {
                gap: 16px;
            }

            .products-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 720px) {
            .hero {
                min-height: auto;
            }

            .hero-inner {
                width: min(100% - 32px, 1280px);
                padding: 22px 0 50px;
            }

            .logo {
                width: 158px;
                margin-bottom: 28px;
            }

            .hero-content {
                padding-left: 20px;
            }

            .hero-title {
                font-size: clamp(1.8rem, 10vw, 3.05rem);
                white-space: normal;
            }

            .category-panel {
                width: min(100% - 24px, 1280px);
                padding: 14px;
            }

            .category-list {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .category-button {
                min-height: 44px;
            }

            .category-name {
                font-size: 0.75rem;
            }

            main {
                width: min(100% - 24px, 1280px);
                padding-top: 32px;
            }

            .products-grid {
                grid-template-columns: 1fr;
            }

            .product-card {
                min-height: auto;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                scroll-behavior: auto !important;
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
            }
        }
    </style>
</head>
<body>
    <header class="hero">
        <div class="hero-inner">
            <img class="logo" src="LAMBERT blanco sin fondo.png" alt="Lambert">

            <div class="hero-content">
                <p class="hero-kicker">Catálogo técnico</p>
                <h1 class="hero-title">Banco de unidades</h1>
                <div class="red-rule" aria-hidden="true"></div>
                <p class="hero-description">Acceso rápido a fichas técnicas de unidades</p>
            </div>
        </div>
    </header>

    <nav class="category-panel" aria-label="Categorías de unidades">
        <div class="category-list" id="categoryList"></div>
    </nav>

    <main>
        <section class="view active" id="catalogView" aria-live="polite"></section>
    </main>

    <script>
        const PDF_PLACEHOLDER = "https://example.com/ficha.pdf";

        const categorias = [
            {
                id: "acoplados",
                nombre: "Acoplados",
                productos: [
                    { nombre: "Baranda volcable", descripcion: "Acoplado con sistema de barandas volcables para cargas a granel." },
                    { nombre: "Curtain sider", descripcion: "Acoplado con lonas corredizas y laterales desmontables." },
                    { nombre: "Playo", descripcion: "Acoplado tipo playa para transporte de cargas generales." },
                    { nombre: "Paquetero", descripcion: "Acoplado cerrado ideal para cargas fraccionadas." },
                    { nombre: "Forestal", descripcion: "Acoplado forestal para transporte de rollizos y cargas largas." },
                    { nombre: "Volcador bilateral", descripcion: "Acoplado volcador con descarga lateral a ambos lados." },
                    { nombre: "Todo puertas", descripcion: "Acoplado con apertura total lateral y trasera." },
                    { nombre: "Isotérmico", descripcion: "Acoplado térmico con aislamiento para cargas refrigeradas." }
                ]
            },
            {
                id: "semirremolques",
                nombre: "Semirremolques",
                productos: [
                    { nombre: "Semirremolque playo", descripcion: "Semirremolque tipo playo para transporte de cargas generales." },
                    { nombre: "Curtain sider", descripcion: "Semirremolque con lonas corredizas y laterales desmontables." },
                    { nombre: "Baranda volcable", descripcion: "Semirremolque con sistema de barandas volcables." },
                    { nombre: "Tolva", descripcion: "Semirremolque tolva para transporte y descarga de graneles." }
                ]
            },
            {
                id: "carrocerias",
                nombre: "Carrocerías",
                productos: [
                    { nombre: "Paquetero", descripcion: "Carrocería cerrada para distribución y cargas fraccionadas." },
                    { nombre: "Baranda volcable", descripcion: "Carrocería con laterales volcables para carga general." },
                    { nombre: "Todo puertas", descripcion: "Carrocería con apertura lateral y trasera." },
                    { nombre: "Isotérmico", descripcion: "Carrocería térmica con aislamiento para cargas refrigeradas." }
                ]
            },
            {
                id: "bitrenes",
                nombre: "Bitrenes",
                productos: [
                    { nombre: "Bitren playo", descripcion: "Configuración playo para cargas generales de alto volumen." },
                    { nombre: "Bitren forestal", descripcion: "Configuración forestal para transporte de rollizos." },
                    { nombre: "Bitren tolva", descripcion: "Configuración tolva para graneles con descarga controlada." },
                    { nombre: "Bitren especial", descripcion: "Configuración especial desarrollada para necesidades específicas." }
                ]
            }
        ];

        const categoryList = document.querySelector("#categoryList");
        const catalogView = document.querySelector("#catalogView");

        function crearBotonesCategoria() {
            categoryList.innerHTML = categorias.map((categoria) => `
                <button class="category-button" type="button" data-category="${categoria.id}" aria-pressed="false">
                    <span class="category-name">${categoria.nombre}</span>
                </button>
            `).join("");
        }

        function actualizarBotones(categoriaActiva) {
            document.querySelectorAll(".category-button").forEach((button) => {
                const activo = button.dataset.category === categoriaActiva;
                button.classList.toggle("active", activo);
                button.setAttribute("aria-pressed", String(activo));
            });
        }

        function mostrarCategoria(idCategoria) {
            const categoria = categorias.find((item) => item.id === idCategoria) || categorias[0];
            actualizarBotones(categoria.id);

            const productosHtml = categoria.productos.length
                ? categoria.productos.map(crearTarjetaProducto).join("")
                : `<div class="empty-state">Todavía no hay fichas cargadas en esta categoría.</div>`;

            catalogView.innerHTML = `
                <div class="section-head">
                    <div class="section-title-wrap">
                        <h2 class="section-title">${categoria.nombre}</h2>
                    </div>
                </div>
                <div class="products-grid">${productosHtml}</div>
            `;

            history.replaceState(null, "", `#${categoria.id}`);
        }

        function crearTarjetaProducto(producto) {
            const pdf = producto.pdf || PDF_PLACEHOLDER;

            return `
                <article class="product-card">
                    <h3 class="product-name">${producto.nombre}</h3>
                    <p class="product-description">${producto.descripcion}</p>
                    <hr class="divider">
                    <a class="sheet-link" href="${pdf}" target="_blank" rel="noopener noreferrer">
                        Ver ficha técnica
                    </a>
                </article>
            `;
        }

        categoryList.addEventListener("click", (event) => {
            const button = event.target.closest("[data-category]");
            if (!button) return;
            mostrarCategoria(button.dataset.category);
            window.scrollTo({ top: 0, behavior: "smooth" });
        });

        document.addEventListener("keydown", (event) => {
            const numero = Number(event.key);
            if (numero >= 1 && numero <= categorias.length) {
                mostrarCategoria(categorias[numero - 1].id);
            }
        });

        function iniciar() {
            crearBotonesCategoria();
            const hashInicial = window.location.hash.replace("#", "");
            mostrarCategoria(hashInicial || "acoplados");
        }

        iniciar();
    </script>
</body>
</html>
